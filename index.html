<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩坏电脑的小站 · 导航</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            cursor: none;
            overflow-x: hidden;
            overflow-y: auto;
            flex-direction: column;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .page-title {
            text-align: center;
            font-size: 2.5rem;
            color: #2c3e50;
            margin: 20px 0 30px;
            z-index: 1;
            pointer-events: none;
            user-select: none;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        @media (max-width: 600px) {
            .page-title {
                font-size: 1.8rem;
                margin: 15px 0 25px;
            }
        }

        .categories-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
            padding: 0 25px;
            box-sizing: border-box;
            z-index: 1;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 20px 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s ease;
        }

        .category-card:hover {
            transform: translateY(-2px);
        }

        .category-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #34495e;
            margin: 0 0 5px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #3498db;
            text-align: center;
            letter-spacing: 1px;
            pointer-events: none;
            user-select: none;
        }

        button {
            padding: 14px 18px;
            font-size: 15px;
            color: #fff;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 10px;
            cursor: none;
            width: 100%;
            font-weight: 500;
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(52,152,219,0.25);
            text-align: center;
            word-break: break-word;
            letter-spacing: 0.5px;
            position: relative;
        }

        button:hover {
            background: linear-gradient(135deg, #2980b9, #1c6ea4);
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(52,152,219,0.35);
        }

        button:active {
            transform: scale(0.97);
        }

        .custom-cursor {
            position: fixed;
            width: 32px;
            height: 32px;
            pointer-events: none;
            z-index: 9999;
            top: 0;
            left: 0;
            will-change: transform;
            transition: none;
        }

        @media (max-width: 600px) {
            .categories-container {
                grid-template-columns: 1fr;
                padding: 0 15px;
            }
            button {
                padding: 13px 16px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <h2 class="page-title">玩坏电脑的小站</h2>
    <div class="categories-container" id="categoriesContainer"></div>
    <img src="https://wzml.cc.cd/gsb.png"
    alt="Custom Cursor" class="custom-cursor" id="customCursor">

    <script>
        (function() {
            // ========== 嵌套字典：按类型分栏 ==========
            const categories = {
                "快链接（仅提供链接，不承担任何责任）": {
                    "老豆荚旧版": "https://oldpods.mysxl.cn/old",
                    "“新月的摇篮曲”歌曲下载": "https://ghproxy.net/github.com/wzmwayne/wzmwayne.github.io/releases/download/data/HOYO-MiX.-.Lullaby.of.the.New.Moon.I.Somnias.a.Luna.mp3",
                    "读日月前事（并非整活）": "https://whdn.lanzouu.com/iyxXS3qrtvtg",
                    "下载flclash": "https://pan.huang1111.cn/s/jR3KDuy",
                    "下载chrome旧版(edgeone)": "https://edgeone.gh-proxy.org/https://github.com/wzmwayne/wzmwayne.github.io/releases/download/data/4.4.Chrome_80.0.3987.149.apk",
                    "下载chrome旧版(fastly)": "https://cdn.gh-proxy.org/https://github.com/wzmwayne/wzmwayne.github.io/releases/download/data/4.4.Chrome_80.0.3987.149.apk",
                    "下载mt管理器(官网)": "https://mt2.cn/download/",
                    "下载白名单管理器（即将开源）(fastly)": "https://cdn.gh-proxy.org/https://github.com/wzmwayne/wzmwayne.github.io/releases/download/data/whitelist.apk",
                    "下载白名单管理器（即将开源）(edgeone)": "https://edgeone.gh-proxy.org/https://github.com/wzmwayne/wzmwayne.github.io/releases/download/data/whitelist.apk"
                },
                "较大项目": {
                    "下载 BetterSeewo": "https://wzml.cc.cd/betterseewo/",
                    "下载 锁屏工具": "https://github.com/wzmwayne/locker/releases/download/1.0/default.exe",
                    "锁屏介绍": "https://github.com/wzmwayne/locker/releases/tag/1.0",
                    "iFlow API": "https://wzml.cc.cd/iflow-api/#",
                    "touchtools": "https://wzml.cc.cd/WPPtools/"
                },
                "在线工具": {
                    "Online CMD": "https://wzml.cc.cd/onlin_cmd/",
                    "增加文件大小": "https://wzml.cc.cd/Increase_File_Size/",
                    "PrintHelper在线灵蝶版": "https://wzml.cc.cd/print_helper/"
                },
                "游戏与启动": {
                    "MC Lunch": "https://wzml.cc.cd/mclunch/"
                },
                "篡改猴脚本": {
                    "ScriptWeaver灵蝶": "https://wzml.cc.cd/ScriptWeaver/"
                },
                "社交与其它": {
                    "我的哔哩哔哩(已封号)": "https://space.bilibili.com/3546822289131703",
                    "Free VPN (Clash)": "https://github.com/Au1rxx/free-vpn-subscriptions/raw/main/output/clash.yaml"
                }
            };

            const container = document.getElementById('categoriesContainer');
            const customCursor = document.getElementById('customCursor');

            function renderCategories() {
                container.innerHTML = '';
                for (const [categoryName, buttons] of Object.entries(categories)) {
                    const card = document.createElement('div');
                    card.className = 'category-card';
                    const title = document.createElement('h3');
                    title.className = 'category-title';
                    title.textContent = categoryName;
                    card.appendChild(title);
                    for (const [btnName, link] of Object.entries(buttons)) {
                        const button = document.createElement('button');
                        button.textContent = btnName;
                        button.addEventListener('click', (e) => {
                            e.stopPropagation();
                            e.preventDefault();
                            window.open(link, '_blank');
                        });
                        button.addEventListener('mouseup', (e) => e.stopPropagation());
                        button.addEventListener('mousedown', (e) => e.stopPropagation());
                        card.appendChild(button);
                    }
                    container.appendChild(card);
                }
            }

            renderCategories();

            // 自定义光标
            let cursorX = 0, cursorY = 0;
            let cursorVisible = false;
            let rafId = null;
            let pendingX = 0, pendingY = 0;

            function updateCursorPosition() {
                customCursor.style.left = pendingX + 'px';
                customCursor.style.top = pendingY + 'px';
                rafId = null;
            }

            document.addEventListener('mousemove', (event) => {
                cursorX = event.clientX;
                cursorY = event.clientY;
                cursorVisible = true;
                customCursor.style.display = 'block';
                pendingX = cursorX;
                pendingY = cursorY;
                if (!rafId) {
                    rafId = requestAnimationFrame(updateCursorPosition);
                }
            }, { passive: true });

            document.addEventListener('mouseleave', () => {
                cursorVisible = false;
                customCursor.style.display = 'none';
                if (rafId) {
                    cancelAnimationFrame(rafId);
                    rafId = null;
                }
            });

            document.addEventListener('mouseenter', (event) => {
                cursorVisible = true;
                customCursor.style.display = 'block';
                cursorX = event.clientX;
                cursorY = event.clientY;
                pendingX = cursorX;
                pendingY = cursorY;
                if (!rafId) {
                    rafId = requestAnimationFrame(updateCursorPosition);
                }
            });

            document.addEventListener('contextmenu', (event) => {
                event.preventDefault();
            });

            document.addEventListener('touchmove', (event) => {
                if (event.touches.length > 0) {
                    cursorX = event.touches[0].clientX;
                    cursorY = event.touches[0].clientY;
                    cursorVisible = true;
                    customCursor.style.display = 'block';
                    pendingX = cursorX;
                    pendingY = cursorY;
                    if (!rafId) {
                        rafId = requestAnimationFrame(updateCursorPosition);
                    }
                }
            }, { passive: true });

            document.addEventListener('touchend', () => {
                setTimeout(() => {
                    if (!cursorVisible) {
                        customCursor.style.display = 'none';
                    }
                }, 1500);
            });

            cursorX = window.innerWidth / 2;
            cursorY = window.innerHeight / 2;
            customCursor.style.left = cursorX + 'px';
            customCursor.style.top = cursorY + 'px';
            customCursor.style.display = 'block';
            cursorVisible = true;
        })();
    </script>
</body>
</html>
