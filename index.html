<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩坏电脑的小站 · 导航</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            cursor: none;
            overflow-x: hidden;
            overflow-y: auto;
            flex-direction: column;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .page-title {
            text-align: center;
            font-size: 2.5rem;
            color: #2c3e50;
            margin: 20px 0 30px;
            z-index: 1;
            pointer-events: none;
            user-select: none;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        @media (max-width: 600px) {
            .page-title {
                font-size: 1.8rem;
                margin: 15px 0 25px;
            }
        }

        .categories-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
            padding: 0 25px;
            box-sizing: border-box;
            z-index: 1;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 20px 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s ease;
        }

        .category-card:hover {
            transform: translateY(-2px);
        }

        .category-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #34495e;
            margin: 0 0 5px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #3498db;
            text-align: center;
            letter-spacing: 1px;
            pointer-events: none;
            user-select: none;
        }

        button {
            padding: 14px 18px;
            font-size: 15px;
            color: #fff;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 10px;
            cursor: none;
            width: 100%;
            font-weight: 500;
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(52,152,219,0.25);
            text-align: center;
            word-break: break-word;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden; /* 为涟漪效果准备 */
        }

        button:hover {
            background: linear-gradient(135deg, #2980b9, #1c6ea4);
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(52,152,219,0.35);
        }

        button:active {
            transform: scale(0.97);
        }

        /* 涟漪元素样式（由灵蝶插入） */
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .custom-cursor {
            position: fixed;
            width: 32px;
            height: 32px;
            pointer-events: none;
            z-index: 9999;
            top: 0;
            left: 0;
            will-change: transform;
            transition: none;
        }

        @media (max-width: 600px) {
            .categories-container {
                grid-template-columns: 1fr;
                padding: 0 15px;
            }
            button {
                padding: 13px 16px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <h2 class="page-title">玩坏电脑的小站</h2>
    <div class="categories-container" id="categoriesContainer"></div>
    <img src="https://github.com/wzmwayne/wzmwayne.github.io/raw/b461935d4929e87c5a28020e9b7d0295f5d9700c/gsb.png"
    alt="Custom Cursor" class="custom-cursor" id="customCursor">

    <!-- 灵蝶未安装提示（普通 script 即可，所有浏览器执行） -->
    <div id="sw-install-hint" style="position:fixed;bottom:20px;right:20px;background:#2c3e50;color:#ecf0f1;padding:10px 16px;border-radius:4px;font-size:14px;z-index:9999;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.2);">
        ⚡ 点击按钮有涟漪特效？<a href="https://github.com/wzmwayne/ScriptWeaver" target="_blank" style="color:#3b82f6;text-decoration:underline;">安装灵蝶</a> 解锁更多玩法
    </div>
    <script>
        (function() {
            if (!window.__ScriptWeaver__) {
                document.getElementById('sw-install-hint').style.display = 'block';
            }
        })();
    </script>

    <!-- 核心功能（普通脚本，保证基础可用） -->
    <script>
        (function() {
            // ========== 嵌套字典：按类型分栏 ==========
            const categories = {
                "下载项目资源": {
                    "下载 BetterSeewo": "https://wzmwayne.github.io/betterseewo/",
                    "下载 锁屏工具": "https://github.com/wzmwayne/locker/releases/download/1.0/default.exe",
                    "锁屏介绍": "https://github.com/wzmwayne/locker/releases/tag/1.0",
                    "iFlow API": "https://wzmwayne.github.io/iflow-api/#"
                },
                "在线工具": {
                    "Online CMD": "https://wzmwayne.github.io/onlin_cmd/",
                    "增加文件大小": "https://wzmwayne.github.io/Increase_File_Size/",
                    "PrintHelper在线灵蝶版": "https://wzmwayne.github.io/print_helper/"
                },
                "游戏与启动": {
                    "MC Lunch": "https://wzmwayne.github.io/mclunch/"
                },
                "篡改猴脚本": {
                    "ScriptWeaver灵蝶": "https://wzmwayne.github.io/ScriptWeaver/"
                },
                "社交与其它": {
                    "我的哔哩哔哩(已封号)": "https://space.bilibili.com/3546822289131703",
                    "Free VPN (Clash)": "https://github.com/Au1rxx/free-vpn-subscriptions/raw/main/output/clash.yaml"
                }
            };

            const container = document.getElementById('categoriesContainer');
            const customCursor = document.getElementById('customCursor');

            function renderCategories() {
                container.innerHTML = '';
                for (const [categoryName, buttons] of Object.entries(categories)) {
                    const card = document.createElement('div');
                    card.className = 'category-card';
                    const title = document.createElement('h3');
                    title.className = 'category-title';
                    title.textContent = categoryName;
                    card.appendChild(title);
                    for (const [btnName, link] of Object.entries(buttons)) {
                        const button = document.createElement('button');
                        button.textContent = btnName;
                        button.addEventListener('click', (e) => {
                            e.stopPropagation();
                            e.preventDefault();
                            window.open(link, '_blank');
                        });
                        button.addEventListener('mouseup', (e) => e.stopPropagation());
                        button.addEventListener('mousedown', (e) => e.stopPropagation());
                        card.appendChild(button);
                    }
                    container.appendChild(card);
                }
            }

            renderCategories();

            // 自定义光标
            let cursorX = 0, cursorY = 0;
            let cursorVisible = false;
            let rafId = null;
            let pendingX = 0, pendingY = 0;

            function updateCursorPosition() {
                customCursor.style.left = pendingX + 'px';
                customCursor.style.top = pendingY + 'px';
                rafId = null;
            }

            document.addEventListener('mousemove', (event) => {
                cursorX = event.clientX;
                cursorY = event.clientY;
                cursorVisible = true;
                customCursor.style.display = 'block';
                pendingX = cursorX;
                pendingY = cursorY;
                if (!rafId) {
                    rafId = requestAnimationFrame(updateCursorPosition);
                }
            }, { passive: true });

            document.addEventListener('mouseleave', () => {
                cursorVisible = false;
                customCursor.style.display = 'none';
                if (rafId) {
                    cancelAnimationFrame(rafId);
                    rafId = null;
                }
            });

            document.addEventListener('mouseenter', (event) => {
                cursorVisible = true;
                customCursor.style.display = 'block';
                cursorX = event.clientX;
                cursorY = event.clientY;
                pendingX = cursorX;
                pendingY = cursorY;
                if (!rafId) {
                    rafId = requestAnimationFrame(updateCursorPosition);
                }
            });

            document.addEventListener('contextmenu', (event) => {
                event.preventDefault();
            });

            document.addEventListener('touchmove', (event) => {
                if (event.touches.length > 0) {
                    cursorX = event.touches[0].clientX;
                    cursorY = event.touches[0].clientY;
                    cursorVisible = true;
                    customCursor.style.display = 'block';
                    pendingX = cursorX;
                    pendingY = cursorY;
                    if (!rafId) {
                        rafId = requestAnimationFrame(updateCursorPosition);
                    }
                }
            }, { passive: true });

            document.addEventListener('touchend', () => {
                setTimeout(() => {
                    if (!cursorVisible) {
                        customCursor.style.display = 'none';
                    }
                }, 1500);
            });

            cursorX = window.innerWidth / 2;
            cursorY = window.innerHeight / 2;
            customCursor.style.left = cursorX + 'px';
            customCursor.style.top = cursorY + 'px';
            customCursor.style.display = 'block';
            cursorVisible = true;
        })();
    </script>

    <!-- 灵蝶增强动画：按钮点击涟漪效果（仅对安装了灵蝶的用户生效） -->
    <script type="x-tm-inline">
        (function() {
            // 为每个按钮绑定涟漪动画
            function addRippleEffect(button) {
                button.addEventListener('click', function(e) {
                    // 移除已有的涟漪元素
                    const existingRipple = button.querySelector('.ripple-effect');
                    if (existingRipple) existingRipple.remove();

                    const ripple = document.createElement('span');
                    ripple.className = 'ripple-effect';

                    const rect = button.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = size + 'px';

                    const x = e.clientX - rect.left - size / 2;
                    const y = e.clientY - rect.top - size / 2;
                    ripple.style.left = x + 'px';
                    ripple.style.top = y + 'px';

                    button.appendChild(ripple);

                    // 动画结束后自动移除
                    ripple.addEventListener('animationend', function() {
                        ripple.remove();
                    });
                });
            }

            // 等待 DOM 加载完成后给所有按钮绑定
            function initRipple() {
                const buttons = document.querySelectorAll('button');
                buttons.forEach(addRippleEffect);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initRipple);
            } else {
                initRipple();
            }

            // 隐藏灵蝶未安装提示（如果已安装）
            const hint = document.getElementById('sw-install-hint');
            if (hint) hint.style.display = 'none';
        })();
    </script>
</body>
</html>
